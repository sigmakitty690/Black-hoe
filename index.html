<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:#000;
  font-family:'Noto Sans SC', system-ui, -apple-system, sans-serif; color:#e8e6e3; }
#glcanvas { position:fixed; inset:0; width:100%; height:100%; display:block;
  touch-action:none; cursor:grab; }
#glcanvas.dragging { cursor:grabbing; }

#titlebar { position:fixed; top:20px; left:24px; pointer-events:none; user-select:none; z-index:5; }

#panel { position:fixed; top:20px; right:20px; width:252px; z-index:10;

  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  box-shadow:0 8px 32px rgba(0,0,0,.5); overflow:hidden; }
#panel .head { display:flex; justify-content:space-between; align-items:center;
  padding:11px 16px; border-bottom:1px solid rgba(255,255,255,.07);
  font-size:13px; font-weight:500; letter-spacing:2px; }
#collapseBtn { background:none; border:none; color:#9aa5b5; font-size:16px; cursor:pointer;
  line-height:1; padding:2px 8px; border-radius:6px; }
#collapseBtn:hover { background:rgba(255,255,255,.08); color:#fff; }
#panelBody { padding:13px 16px 16px; max-height:72vh; overflow-y:auto; }
#panel.collapsed #panelBody { display:none; }
#panelBody::-webkit-scrollbar { width:5px; }
#panelBody::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:3px; }
.section { font-size:11px; color:#ff9a3c; letter-spacing:3px; margin:13px 0 8px; opacity:.9; }
.section:first-child { margin-top:0; }
.row { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; font-size:13px; }
.row label { color:rgba(232,230,227,.85); cursor:pointer; }
input[type=checkbox] { accent-color:#ff9a3c; width:15px; height:15px; cursor:pointer; }
.sliderRow { display:block; margin-bottom:9px; }
.sliderRow .top { display:flex; justify-content:space-between; font-size:13px; margin-bottom:1px; }
.sliderRow .top label { color:rgba(232,230,227,.85); }
.val { font-size:11px; color:rgba(232,230,227,.5); font-variant-numeric:tabular-nums; }
input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:4px;
  border-radius:2px; background:rgba(255,255,255,.14); outline:none; margin:7px 0 2px; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px;
  border-radius:50%; background:#ff9a3c; border:2px solid #1a1208;
  box-shadow:0 0 8px rgba(255,154,60,.6); cursor:pointer; }
input[type=range]::-moz-range-thumb { width:11px; height:11px; border-radius:50%;

select { background:rgba(255,255,255,.08); color:#e8e6e3; border:1px solid rgba(255,255,255,.12);
  border-radius:8px; padding:4px 8px; font-size:12px; cursor:pointer; outline:none; font-family:inherit; }
button.action { width:100%; margin-top:5px; padding:8px 0;
  background:linear-gradient(135deg, rgba(255,154,60,.18), rgba(255,154,60,.07));
  border:1px solid rgba(255,154,60,.35); color:#ffb877; border-radius:9px;
  font-size:13px; cursor:pointer; font-family:inherit; letter-spacing:3px; transition:all .2s; }
button.action:hover { background:linear-gradient(135deg, rgba(255,154,60,.32), rgba(255,154,60,.14));
  box-shadow:0 0 16px rgba(255,154,60,.25); }

#stats { position:fixed; left:24px; bottom:18px; z-index:5; font-size:11px;
  color:rgba(232,230,227,.5); letter-spacing:1px; font-variant-numeric:tabular-nums;
  pointer-events:none; text-shadow:0 1px 6px rgba(0,0,0,.9); }
#stats b { color:rgba(255,180,110,.9); font-weight:500; }

#hint { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:5;
  padding:8px 20px; background:rgba(12,15,26,.62); border:1px solid rgba(255,255,255,.09);
  border-radius:999px; font-size:12px; color:rgba(232,230,227,.78); letter-spacing:1px;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  transition:opacity 1.2s; pointer-events:none; white-space:nowrap; }
#hint.hidden { opacity:0; }

#err { display:none; position:fixed; inset:0; z-index:99; background:#0a0d16;

  #panel { width:212px; right:12px; top:12px; }

<body>
<canvas id="glcanvas"></canvas>

<header id="titlebar">
  <h1>黑洞<span>模拟</span></h1>
  <p>广义相对论光线追踪 · 吸积盘 / 光子环 / 多普勒频移</p>
</header>

<aside id="panel">
  <div class="head"><span>⚙ 控制面板</span><button id="collapseBtn" title="折叠/展开">–</button></div>
  <div id="panelBody">
    <div class="section">物理效果</div>
    <div class="row"><label for="chkDoppler">多普勒频移</label><input type="checkbox" id="chkDoppler" checked></div>
    <div class="row"><label for="chkGrav">引力红移</label><input type="checkbox" id="chkGrav" checked></div>
    <div class="row"><label for="chkRing">光子环辉光</label><input type="checkbox" id="chkRing" checked></div>
    <div class="section">吸积盘</div>
    <div class="sliderRow"><div class="top"><label for="sBright">亮度</label><span class="val" id="vBright">1.0×</span></div>
      <input type="range" id="sBright" min="0.2" max="3" step="0.05" value="1"></div>
    <div class="sliderRow"><div class="top"><label for="sTemp">温度</label><span class="val" id="vTemp">5500 K</span></div>
      <input type="range" id="sTemp" min="2500" max="14000" step="100" value="5500"></div>
    <div class="sliderRow"><div class="top"><label for="sSpeed">时间流速</label><span class="val" id="vSpeed">1.0×</span></div>
      <input type="range" id="sSpeed" min="0" max="4" step="0.1" value="1"></div>
    <div class="section">渲染</div>
    <div class="row"><label for="selQuality">画质</label>
      <select id="selQuality">
        <option value="low">低</option>
        <option value="mid" selected>中</option>
        <option value="high">高</option>
      </select></div>
    <button class="action" id="btnReset">重置视角</button>
  </div>
</aside>

<div id="stats">FPS <b id="stFps">--</b> · 距离 <b id="stDist">--</b> Rs · 积分步 <b id="stSteps">--</b></div>
<div id="hint">🖱 拖拽旋转视角 · 滚轮缩放镜头 · 双击复位</div>
<div id="err">⚠ 无法初始化 WebGL<br>请使用支持 WebGL 的现代浏览器</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';
if (!window.THREE) { document.getElementById('err').style.display = 'flex'; return; }

const VERT = `
void main() { gl_Position = vec4(position.xy, 0.0, 1.0); }
`;

const FRAG = `
#ifdef GL_FRAGMENT_PRECISION_HIGH
precision highp float;
#else
precision mediump float;
#endif

uniform vec2  uResolution;
uniform float uTime;
uniform vec3  uCamPos;
uniform mat3  uCamMat;
uniform float uDiskTemp;
uniform float uDoppler;
uniform float uGravShift;
uniform float uBrightness;
uniform float uRingGlow;
uniform int   uMaxSteps;
uniform float uDiskInner;
uniform float uDiskOuter;

/* ---------- 噪声 ---------- */
float hash12(vec2 p){
    vec3 p3 = fract(vec3(p.xyx) * 0.1031);
    p3 += dot(p3, p3.yzx + 33.33);
    return fract((p3.x + p3.y) * p3.z);
}
float hash13(vec3 p3){
    p3 = fract(p3 * 0.1031);
    p3 += dot(p3, p3.zyx + 31.32);
    return fract((p3.x + p3.y) * p3.z);
}
float vnoise(vec2 p){
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    float a = hash12(i);
    float b = hash12(i + vec2(1.0, 0.0));
    float c = hash12(i + vec2(0.0, 1.0));
    float d = hash12(i + vec2(1.0, 1.0));
    return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
}
float fbm(vec2 p){
    float v = 0.0;
    float a = 0.5;
    for(int i = 0; i < 5; i++){
        v += a * vnoise(p);
        p = p * 2.03 + vec2(11.71, 9.23);
        a *= 0.5;
    }
    return v;
}

/* ---------- 黑体辐射颜色 (K -> RGB) ---------- */
vec3 blackbody(float t){
    t = clamp(t, 900.0, 40000.0);
    vec3 c;
    c.r = 56100000.0 * pow(t, -1.5) + 148.0;
    c.g = 100.04 * log(t) - 623.6;
    if(t > 6500.0) c.g = 35200000.0 * pow(t, -1.5) + 184.0;
    c.b = 194.18 * log(t) - 1448.6;
    c = clamp(c, 0.0, 255.0) / 255.0;
    if(t < 1000.0) c *= t / 1000.0;
    return c;
}

/* ---------- 施瓦西零测地线 (rs = 1, c = 1) ----------
   d²x/dλ² = -3/2 · h² · x / r⁵,  h = |x × v| 守恒 */
vec3 accel(vec3 p, float h2){
    float r2 = dot(p, p);
    float r = sqrt(r2);
    return (-1.5 * h2 / (r2 * r2 * r)) * p;
}

/* ---------- 吸积盘发射 (开普勒旋转 + 多普勒 + 引力红移) ---------- */
vec3 diskEmission(vec3 cp, vec3 vDir, out float alpha){
    float rr = length(cp.xz);
    alpha = 0.0;
    if(rr < uDiskInner || rr > uDiskOuter) return vec3(0.0);

    /* 开普勒轨道速度 β = sqrt(GM/r), GM = rs/2 = 0.5 */
    float beta = sqrt(0.5 / rr);
    vec3 betaVec = beta * vec3(-cp.z, 0.0, cp.x) / rr;
    float gamma = inversesqrt(max(1.0 - beta * beta, 1e-4));

    /* 物理光子方向(盘 -> 相机) = -v, 多普勒因子 δ = 1/[γ(1-β·n)] */
    vec3 n = -normalize(vDir);
    float dop = 1.0 / (gamma * (1.0 - dot(betaVec, n)));
    dop = mix(1.0, dop, uDoppler);

    /* 引力红移 sqrt(1 - rs/r) */
    float grav = sqrt(max(1.0 - 1.0 / rr, 0.0));
    grav = mix(1.0, grav, uGravShift);

    float shift = dop * grav;
    float T = uDiskTemp * pow(uDiskInner / rr, 0.75) * shift;
    vec3 bb = blackbody(T);
    float beam = pow(shift, 3.5);   /* 相对论性束流 */

    /* 较差旋转纹理 */
    float ang = atan(cp.z, cp.x);
    float omega = sqrt(0.5 / (rr * rr * rr));
    float rot = ang - uTime * omega * 3.0;
    float lr = log(rr);
    float n1 = fbm(vec2(rot * 1.6 + lr * 2.0, lr * 3.0));
    float n2 = fbm(vec2(rot * 4.5 - lr * 1.5, lr * 6.0) + 5.2);
    float tex = (0.45 + 0.85 * n1) * (0.65 + 0.55 * n2);

    float edgeIn  = smoothstep(uDiskInner * 0.98, uDiskInner * 1.15, rr);
    float edgeOut = 1.0 - smoothstep(uDiskOuter * 0.45, uDiskOuter, rr);
    float radial = edgeIn * edgeOut * pow(uDiskInner / rr, 2.0);

    float density = radial * tex * 2.4;
    alpha = clamp(density, 0.0, 0.93);
    return bb * beam * density;
}

/* ---------- 背景星空 ---------- */
float starField(vec3 rd){
    float s = 0.0;
    for(int l = 0; l < 3; l++){
        float sc = 60.0 + float(l) * 90.0;
        vec3 p = rd * sc;
        vec3 id = floor(p);
        vec3 gv = fract(p) - 0.5;
        float rnd = hash13(id + float(l) * 13.7);
        if(rnd > 0.93){
            vec3 offs = vec3(hash13(id + 1.7), hash13(id + 3.1), hash13(id + 5.3)) - 0.5;
            float d = length(gv - offs * 0.6);
            float b = (rnd - 0.93) / 0.07;
            s += (1.0 - smoothstep(0.0, 0.28, d)) * b * b * 1.6;
        }
    }
    return s;
}
vec3 background(vec3 rd){
    vec3 c = vec3(0.006, 0.008, 0.020);
    vec3 bn = normalize(vec3(0.25, 1.0, 0.4));
    float band = exp(-abs(dot(rd, bn)) * 3.0);
    float bnz = fbm(vec2(atan(rd.z, rd.x) * 1.5, rd.y * 5.0));
    c += band * (0.03 + 0.10 * bnz) * vec3(0.30, 0.36, 0.58);
    c += starField(rd) * vec3(0.85, 0.90, 1.0);
    return c;
}

void main(){
    vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution) / uResolution.y;
    vec3 rd = normalize(uCamMat * vec3(uv, 1.5));
    vec3 ro = uCamPos;

    vec3 p = ro;
    vec3 v = rd;
    vec3 prevP = ro;
    float prevY = ro.y;

    vec3 hv = cross(ro, rd);
    float h2 = dot(hv, hv);          /* 守恒角动量平方 */

    vec3 col = vec3(0.0);
    float trans = 1.0;
    float minR = length(ro);
    bool escaped = false;

    /* RK4 积分光线轨迹 */
    for(int i = 0; i < 600; i++){
        if(i >= uMaxSteps) break;

        float r2 = dot(p, p);
        float r = sqrt(r2);
        minR = min(minR, r);
        float dt = clamp(0.06 * r, 0.03, 0.6);

        vec3 a1 = accel(p, h2);
        vec3 v2 = v + 0.5 * dt * a1;
        vec3 p2 = p + 0.5 * dt * v;
        vec3 a2 = accel(p2, h2);
        vec3 v3 = v + 0.5 * dt * a2;
        vec3 p3 = p + 0.5 * dt * v2;
        vec3 a3 = accel(p3, h2);
        vec3 v4 = v + dt * a3;
        vec3 p4 = p + dt * v3;
        vec3 a4 = accel(p4, h2);

        prevP = p;
        p += (dt / 6.0) * (v + 2.0 * v2 + 2.0 * v3 + v4);
        v += (dt / 6.0) * (a1 + 2.0 * a2 + 2.0 * a3 + a4);

        /* 穿越吸积盘平面 -> 累积发射 */
        if(prevY * p.y < 0.0 && trans > 0.02){
            float tt = prevY / (prevY - p.y);
            vec3 cp = mix(prevP, p, tt);
            float alpha;
            vec3 emit = diskEmission(cp, v, alpha);
            col += trans * emit * uBrightness;
            trans *= 1.0 - alpha;
        }
        prevY = p.y;

        float nr = length(p);
        if(nr < 1.0) break;                              /* 落入视界 */
        if(nr > 70.0 && dot(p, v) > 0.0){ escaped = true; break; }
    }

    if(escaped) col += trans * background(normalize(v));

    /* 光子环辉光 (最接近半径 ≈ 1.5 rs 的光线) */
    float ring = exp(-pow((minR - 1.5) * 5.5, 2.0));
    col += ring * vec3(1.0, 0.82, 0.60) * 0.12 * uRingGlow * uBrightness;

    /* 色调映射 + 伽马 */
    col = 1.0 - exp(-col * 1.35);
    col = pow(col, vec3(0.4545));

    vec2 q = gl_FragCoord.xy / uResolution;
    float vig = 1.0 - 0.30 * pow(length(q - 0.5) * 1.414, 2.8);
    col *= vig;

    col += (hash12(gl_FragCoord.xy) - 0.5) / 255.0;   /* 抖动去色带 */
    gl_FragColor = vec4(col, 1.0);
}
`;

/* ================= 渲染器 ================= */
const canvas = document.getElementById('glcanvas');
let renderer;
try {
    renderer = new THREE.WebGLRenderer({ canvas, antialias:false, depth:false,
        stencil:false, powerPreference:'high-performance' });
} catch(e) { document.getElementById('err').style.display = 'flex'; return; }
renderer.setClearColor(0x000000, 1);

const scene = new THREE.Scene();
const ortho = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const uniforms = {
    uResolution: { value: new THREE.Vector2(1, 1) },
    uTime:       { value: 0 },
    uCamPos:     { value: new THREE.Vector3() },
    uCamMat:     { value: new THREE.Matrix3() },
    uDiskTemp:   { value: 5500 },
    uDoppler:    { value: 1 },
    uGravShift:  { value: 1 },
    uBrightness: { value: 1.0 },
    uRingGlow:   { value: 1 },
    uMaxSteps:   { value: 260 },
    uDiskInner:  { value: 2.8 },
    uDiskOuter:  { value: 13.0 },
};
const material = new THREE.ShaderMaterial({ uniforms, vertexShader: VERT,
    fragmentShader: FRAG, depthTest:false, depthWrite:false });
const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
quad.frustumCulled = false;
scene.add(quad);

/* ================= 相机控制 ================= */
const TAU = Math.PI * 2;
const DEF_AZIM = 0.9, DEF_ELEV = 0.33, DEF_DIST = 13.0;
const MIN_DIST = 3.2, MAX_DIST = 55.0;
let azim = DEF_AZIM, elev = DEF_ELEV, dist = DEF_DIST;
let viewAnim = null;

const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
const lerp = (a, b, t) => a + (b - a) * t;

const camPos = new THREE.Vector3();
const fwd = new THREE.Vector3(), rightV = new THREE.Vector3(), upV = new THREE.Vector3();
const UP = new THREE.Vector3(0, 1, 0);

function updateCamera(){
    const ce = Math.cos(elev), se = Math.sin(elev);
    camPos.set(dist * ce * Math.cos(azim), dist * se, dist * ce * Math.sin(azim));
    fwd.copy(camPos).multiplyScalar(-1).normalize();
    rightV.crossVectors(fwd, UP).normalize();
    upV.crossVectors(rightV, fwd).normalize();
    uniforms.uCamMat.value.set(
        rightV.x, upV.x, fwd.x,
        rightV.y, upV.y, fwd.y,
        rightV.z, upV.z, fwd.z
    );
    uniforms.uCamPos.value.copy(camPos);
}

/* ---- 鼠标 / 触摸 ---- */
const activePointers = new Map();
let lastPinch = 0;

canvas.addEventListener('pointerdown', (e) => {
    canvas.setPointerCapture(e.pointerId);
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    canvas.classList.add('dragging');
    viewAnim = null;
    hideHint();
});
canvas.addEventListener('pointermove', (e) => {
    if (!activePointers.has(e.pointerId)) return;
    const prev = activePointers.get(e.pointerId);
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (activePointers.size === 1) {
        azim -= (e.clientX - prev.x) * 0.005;
        elev = clamp(elev - (e.clientY - prev.y) * 0.005, -1.45, 1.45);
    } else if (activePointers.size === 2) {
        const pts = Array.from(activePointers.values());
        const d = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        if (lastPinch > 0) dist = clamp(dist * lastPinch / d, MIN_DIST, MAX_DIST);
        lastPinch = d;
    }
});
function endPointer(e){
    activePointers.delete(e.pointerId);
    if (activePointers.size < 2) lastPinch = 0;
    if (activePointers.size === 0) canvas.classList.remove('dragging');
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);

canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    dist = clamp(dist * Math.exp(e.deltaY * 0.0012), MIN_DIST, MAX_DIST);
    viewAnim = null;
    hideHint();
}, { passive: false });

canvas.addEventListener('dblclick', resetView);

function resetView(){
    const targetAzim = DEF_AZIM + Math.round((azim - DEF_AZIM) / TAU) * TAU;
    viewAnim = { from: { azim, elev, dist },
                 to: { azim: targetAzim, elev: DEF_ELEV, dist: DEF_DIST }, t: 0 };
}

/* ================= 画质 ================= */
const QUALITY = {
    low:  { steps: 150, scale: 0.55 },
    mid:  { steps: 260, scale: 0.80 },
    high: { steps: 420, scale: 1.00 },
};
let resScale = QUALITY.mid.scale;

function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 1.75) * resScale;
    renderer.setPixelRatio(dpr);
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    renderer.getDrawingBufferSize(uniforms.uResolution.value);
}
function applyQuality(q){
    const preset = QUALITY[q];
    uniforms.uMaxSteps.value = preset.steps;
    resScale = preset.scale;
    resize();
    document.getElementById('stSteps').textContent = preset.steps;
}
window.addEventListener('resize', resize);

/* ================= UI ================= */
const $ = id => document.getElementById(id);
$('chkDoppler').addEventListener('change', e => uniforms.uDoppler.value = e.target.checked ? 1 : 0);
$('chkGrav').addEventListener('change', e => uniforms.uGravShift.value = e.target.checked ? 1 : 0);
$('chkRing').addEventListener('change', e => uniforms.uRingGlow.value = e.target.checked ? 1 : 0);
$('sBright').addEventListener('input', e => {
    uniforms.uBrightness.value = parseFloat(e.target.value);
    $('vBright').textContent = parseFloat(e.target.value).toFixed(1) + '×';
});
$('sTemp').addEventListener('input', e => {
    uniforms.uDiskTemp.value = parseFloat(e.target.value);
    $('vTemp').textContent = e.target.value + ' K';
});
let timeSpeed = 1.0;
$('sSpeed').addEventListener('input', e => {
    timeSpeed = parseFloat(e.target.value);
    $('vSpeed').textContent = timeSpeed.toFixed(1) + '×';
});
$('selQuality').addEventListener('change', e => applyQuality(e.target.value));
$('btnReset').addEventListener('click', resetView);
$('collapseBtn').addEventListener('click', () => {
    const panel = $('panel');
    panel.classList.toggle('collapsed');
    $('collapseBtn').textContent = panel.classList.contains('collapsed') ? '+' : '–';
});

const hint = $('hint');
let hintHidden = false;
function hideHint(){ if (!hintHidden) { hintHidden = true; hint.classList.add('hidden'); } }
setTimeout(hideHint, 9000);

/* ================= 主循环 ================= */
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
applyQuality(isMobile ? 'low' : 'mid');
$('selQuality').value = isMobile ? 'low' : 'mid';

let simTime = 0, lastT = performance.now();
let frames = 0, fpsLast = performance.now();
const stFps = $('stFps'), stDist = $('stDist');

function tick(now){
    const dtms = now - lastT; lastT = now;
    const dtSec = Math.min(dtms / 1000, 0.05);
    simTime += dtSec * timeSpeed;
    uniforms.uTime.value = simTime;

    if (viewAnim) {
        viewAnim.t += dtSec / 0.7;
        const t = Math.min(viewAnim.t, 1);
        const k = t * t * (3 - 2 * t);
        azim = lerp(viewAnim.from.azim, viewAnim.to.azim, k);
        elev = lerp(viewAnim.from.elev, viewAnim.to.elev, k);
        dist = lerp(viewAnim.from.dist, viewAnim.to.dist, k);
        if (t >= 1) viewAnim = null;
    }

    updateCamera();
    renderer.render(scene, ortho);

    frames++;
    if (now - fpsLast > 500) {
        stFps.textContent = Math.round(frames * 1000 / (now - fpsLast));
        stDist.textContent = dist.toFixed(1);
        frames = 0; fpsLast = now;
    }
    requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
})();
</script>
</body>
</html>
